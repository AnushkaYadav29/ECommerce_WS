<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Commerce</title>
    <link rel="stylesheet" href="./style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-dark ">
        <div class="container-fluid text-white">
            <a class="navbar-brand text-white" href="#" >E-Commerce</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link text-white" type="button" data-bs-toggle="modal" data-bs-target="#addProduct">Add
                            Product</a>
                    </li>
                </ul>
                <div class="d-flex" role="search">
                    <a href="./cart.html" class="nav-link"><i class="fa-solid fa-cart-shopping"style="font-size : 160%;"></i><sup class="badge rounded-pill text-bg-danger" id="cartLength">0</sup></a>
                    <!-- add icon for basket from  fontAwesome  -->
                </div>
            </div>
        </div>
    </nav>


    <!-- Hero Section start  -->


    <!-- HERO SECTION -->
<div class="container-fluid p-0">

  <!-- Carousel Banner -->
  <div id="heroCarousel" class="carousel slide h-300" data-bs-ride="carousel">

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="./assets/E-img1.avif"
          class="d-block w-100 hero-banner">
      </div>

      <div class="carousel-item">
        <img src="./assets/E-img2.avif"
          class="d-block w-100 hero-banner">
      </div>

      <div class="carousel-item">
        <img src="./assets/E-img3.webp"
          class="d-block w-100 hero-banner">
      </div>

    </div>

  </div>

  <!-- PRODUCT CARDS OVERLAY -->
  <div class="container hero-cards">
    <div class="row g-3">

      <div class="col-md-3">
        <div class="hero-card">
          <h6>Electronics</h6>
          <img src="./assets/E-img5.avif">
          <p>Up to 60% OFF</p>
        </div>
      </div>

      <div class="col-md-3">
        <div class="hero-card">
          <h6>Fashion</h6>
          <img src="./assets/E-img-7.webp">
          <p>Trendy Styles</p>
        </div>
      </div>

      <div class="col-md-3">
        <div class="hero-card">
          <h6>Home</h6>
          <img src="./assets/E-img6.jpg">
          <p>Decor & More</p>
        </div>
      </div>

      <div class="col-md-3">
        <div class="hero-card">
          <h6>Beauty</h6>
          <img src="./assets/E-img8.avif">
          <p>Best Deals</p>
        </div>
      </div>

    </div>
  </div>

</div>

     <!-- Hero Section end  -->

    <h1 class="text-center mt-5">Products</h1>

    <div class="container text-center">
        <div class="row" id="renderProducts"></div>
    </div>

    <!-- Modal for Add product -->
    <div class="modal fade" id="addProduct" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog ">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Add New Product</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="title" placeholder="Add Product name here">
                            <label for="title">Title</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="description" placeholder="description">
                            <label for="description">Description</label>
                        </div>
                        <div class="form-floating mb-3">
                            
                            
                            <!-- add select options for category  -->
                             <select id="category" class="form-select">
                              <p>Category</p>
                              
                    <option value="">Category</option>
                    <option value="Electronics">Electronics</option>
                    <option value=">Kitchen Accesories">Kitchen Accessories</option>
                    <option value="Clothes">Clothes</option>
                    <option value="Makeup Accessories">Makeup Accessories</option>
                </select>

                        </div>
                        <div class="form-floating mb-3">
                            
                            <!-- add select option for brand  -->
                             <select id="brand" class="form-select">
                              <option value="">Brand</option>
                    
                    <option value="Electronics">Samsung</option>
                    <option value=">Kitchen Accesories">Hokins</option>
                    <option value="Clothes">Clothes</option>
                    <option value="Makeup Accessories">Mars</option>
                </select>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="price" placeholder="price">
                            <label for="price">Price</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="quantity" placeholder="quantity">
                            <label for="quantity">quantity</label>
                        </div>

                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="AddNewProduct()">Add Product</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js">
      

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
